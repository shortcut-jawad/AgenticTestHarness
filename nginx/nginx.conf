# ─────────────────────────────────────────────────────────────────────────────
# Nginx Load Balancer Config
# Round-robin across all "app" service replicas
# ─────────────────────────────────────────────────────────────────────────────

events {
  worker_connections 1024;
}

http {
  upstream nextjs_cluster {
    server app:3000;
    keepalive 32;
  }

  # Custom log showing WHICH instance handled each request
  log_format main '$remote_addr → upstream:$upstream_addr | "$request" | status:$status | ${request_time}s';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name localhost;

    proxy_connect_timeout     10s;
    proxy_send_timeout        30s;
    proxy_read_timeout        30s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Health check — suppress from access logs
    location /api/health {
      proxy_pass http://nextjs_cluster;
      access_log off;
    }

    # Static assets — long cache
    location /_next/static/ {
      proxy_pass http://nextjs_cluster;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # All other routes — load balanced, with failover
    location / {
      proxy_pass http://nextjs_cluster;
      proxy_next_upstream error timeout http_500 http_502 http_503;
      proxy_next_upstream_tries 3;
    }
  }
}
