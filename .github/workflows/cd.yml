# ─────────────────────────────────────────────────────────────────────────────
# cd.yml — Continuous Deployment
#
# Runs on: CI workflow completes successfully on main branch only
# Jobs:
#   1. push-image      → Tag with git SHA + latest, push to Docker Hub
#   2. deploy          → kubectl apply to Kubernetes cluster
#   3. health-check    → Verify deployment is live after rollout
#
# From your version (kept):
#   + workflow_run trigger (only deploys after CI passes — correct pattern)
#   + Docker Hub login + push
#   + kubectl apply
#
# Fixed/added:
#   - actions/checkout@v3 → v4
#   + Image tagged with git SHA (not just :latest) — enables rollback
#   + kubectl rollout status (waits for pods to be ready before health check)
#   + Post-deploy health check
#   + deploy only runs on main branch (your version deployed on any branch that ran CI)
# ─────────────────────────────────────────────────────────────────────────────
name: CD - Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI"]           # Must match the `name:` field in ci.yml exactly
    types: [completed]
    branches: [main]            # Only deploy from main, not feature branches

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/nextjs-app

jobs:
  # ── Job 1: Tag and push Docker image to Docker Hub ────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image-tag: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4    # was v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image (tagged with SHA + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Two tags: SHA for traceability/rollback, latest for convenience
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to Kubernetes ───────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config   # Secure the credentials file

      - name: Update image tag in deployment
        # Patch the deployment to use the exact SHA-tagged image
        # This is safer than re-applying the yaml (which may still reference :latest)
        run: |
          kubectl set image deployment/nextjs-app \
            nextjs-app=${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

      - name: Apply any updated K8s manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        # Blocks until all pods are running the new image — or fails after 3 min
        run: kubectl rollout status deployment/nextjs-app --timeout=180s

  # ── Job 3: Post-deployment health check ───────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for ingress/DNS to propagate
        run: sleep 15

      - name: Check /api/health
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/api/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check FAILED — got HTTP $RESPONSE from ${{ secrets.PRODUCTION_URL }}/api/health"
            exit 1
          fi
          echo "Health check PASSED — deployment of ${{ github.event.workflow_run.head_sha }} is live"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Health check failed — rolling back deployment"
          kubectl rollout undo deployment/nextjs-app
