# ─────────────────────────────────────────────────────────────────────────────
# build.yml — Static Analysis (SonarQube)
#
# Runs on: every push to main, every PR
# What it does: SonarQube code quality + security scan
#
# Fix from your version:
#   - ubuntu-latest instead of macos-latest (10x cheaper GitHub Actions minutes)
#   - fetch-depth: 0 kept (SonarQube needs full git history for blame/coverage)
# ─────────────────────────────────────────────────────────────────────────────
name: Build - Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest        # was macos-latest — ubuntu is cheaper & faster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history required for SonarQube blame analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
