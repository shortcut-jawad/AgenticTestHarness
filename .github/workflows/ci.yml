# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Continuous Integration
#
# Runs on: every push to main, every PR
# Jobs:
#   1. lint-test-build  → ESLint, Prisma, Next.js build, Vitest integration tests
#   2. docker-verify    → Confirms Docker image builds successfully (no push yet)
#   3. security-scan    → Trivy vulnerability scan on the built image
#
# From your version (kept):
#   + Real postgres:16-alpine service (correct — no mocking the DB in CI)
#   + prisma db push for test schema (correct for CI, not migrate deploy)
#   + start-server-and-test for live integration tests
#   + Vitest
#   + NEXT_TELEMETRY_DISABLED
#
# Added:
#   + docker-verify job (catch broken Dockerfiles before CD runs)
#   + security-scan job (Trivy on the built image)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Job 1: Lint, build, integration tests ─────────────────────────────────
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       agentic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentic_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:             postgresql://postgres:postgres@localhost:5432/agentic_test?schema=public
      DIRECT_URL:               postgresql://postgres:postgres@localhost:5432/agentic_test?schema=public
      JWT_SECRET:               ci-test-jwt-secret
      JWT_EXPIRES_DAYS:         "14"
      NEXT_TELEMETRY_DISABLED:  1
      # AI keys: empty strings so the app boots without crashing
      GOOGLE_GEMINI_API:        ""
      GROQ_API_KEY:             ""
      OPENAI_API_KEY:           ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Generate Prisma client & push schema to test DB
        run: npx prisma generate && npx prisma db push

      - name: Build Next.js app
        run: npm run build

      - name: Run integration tests (live server + Vitest)
        run: npx start-server-and-test "npm run start" http://localhost:3000 "npm run test"

  # ── Job 2: Verify Docker image builds ─────────────────────────────────────
  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-test-build   # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — just verify it builds)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: agentic-test-harness:ci-verify
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Security scan ───────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true            # Load into local Docker daemon so Trivy can scan it
          tags: agentic-test-harness:scan
          cache-from: type=gha  # Uses cached layers from docker-verify job

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentic-test-harness:scan
          format: table
          exit-code: '0'        # Set to '1' to fail the pipeline on CRITICAL findings
          ignore-unfixed: true
          severity: CRITICAL,HIGH
